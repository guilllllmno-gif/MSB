/* ── Controls ── */
.controls {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  z-index:100; display:flex; align-items:center; gap:8px;
  background:rgba(15,23,42,.85); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08); border-radius:10px;
  padding:8px 16px;
}
.controls h1 { font-size:13px; font-weight:700; color:#e2e8f0; margin-right:12px; }
.ctrl-btn {
  padding:4px 12px; border-radius:6px; cursor:pointer; font-size:12px;
  font-weight:600; border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06); color:#94a3b8; transition:all .15s;
}
.ctrl-btn:hover { background:rgba(255,255,255,.12); color:#e2e8f0; }
.ctrl-sep { width:1px; height:20px; background:rgba(255,255,255,.1); }

/* ── Legend ── */
.legend {
  position:fixed; bottom:20px; left:20px; z-index:100;
  background:rgba(15,23,42,.85); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08); border-radius:10px;
  padding:12px 16px; display:flex; flex-direction:column; gap:7px;
}
.legend-title { font-size:10px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:.6px; margin-bottom:2px; }
.legend-row { display:flex; align-items:center; gap:8px; font-size:11px; color:#94a3b8; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── Hint ── */
.hint {
  position:fixed; bottom:20px; right:20px; z-index:100;
  font-size:11px; color:#475569;
  background:rgba(15,23,42,.85); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.06); border-radius:8px;
  padding:8px 12px; line-height:1.6;
}

/* ── Canvas ── */
#canvas { width:100vw; height:100vh; cursor:grab; }
#canvas:active { cursor:grabbing; }

/* ── Tooltip ── */
.tooltip {
  position:fixed; pointer-events:none;
  background:rgba(15,23,42,.96); border:1px solid rgba(255,255,255,.1);
  border-radius:8px; padding:8px 12px; font-size:12px; color:#e2e8f0;
  max-width:240px; line-height:1.5; z-index:200;
  display:none; box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.tooltip strong { color:#fff; display:block; margin-bottom:3px; font-size:13px; }
.tooltip span { color:#8b90a7; font-size:11px; }

// ── Layout engine ──────────────────────────────────────────────
const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;

function polarToCart(angle, r) {
  return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
}

function layoutTree(node, x, y, startAngle, endAngle, depth) {
  node.x = x; node.y = y;
  if (!node.children || node.children.length === 0) return;
  const n = node.children.length;
  const gap = (endAngle - startAngle) / n;
  const radii = [260, 200, 155];
  const rad = radii[Math.min(depth, radii.length-1)];
  node.children.forEach((child, i) => {
    const angle = startAngle + gap * i + gap / 2;
    const pos = polarToCart(angle, rad);
    layoutTree(child, x + pos.x, y + pos.y, angle - gap/2, angle + gap/2, depth + 1);
  });
}

const rootAngleParts = [
  [Math.PI * 0.88, Math.PI * 1.18],   // agent    left-bottom
  [Math.PI * 1.22, Math.PI * 1.58],   // kyc      bottom
  [Math.PI * 1.62, Math.PI * 1.98],   // kyw      bottom-right
  [Math.PI * -0.08, Math.PI * 0.28],  // tx       right
  [Math.PI * 0.30, Math.PI * 0.58],   // str      right-bottom
  [Math.PI * 0.52, Math.PI * 0.82],   // mgmt     bottom-right-ish
  [Math.PI * -0.42, Math.PI * -0.12], // admin    top-right
];

TREE.x = cx; TREE.y = cy;
TREE.children.forEach((child, i) => {
  const [sa, ea] = rootAngleParts[i];
  const mid = (sa + ea) / 2;
  const pos = polarToCart(mid, 220);
  layoutTree(child, cx + pos.x, cy + pos.y, sa, ea, 1);
});

// ── Render ──────────────────────────────────────────────────────
const svg = document.getElementById('canvas');
svg.setAttribute('width', window.innerWidth);
svg.setAttribute('height', window.innerHeight);

let zoom = 1, panX = 0, panY = 0;
let showLabels = true;
const g = document.createElementNS('http://www.w3.org/2000/svg','g');
svg.appendChild(g);

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const gg = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${gg},${b},${a})`;
}

function renderEdges(node) {
  if (!node.children) return;
  node.children.forEach(child => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','path');
    const dx = child.x - node.x, dy = child.y - node.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const x1 = node.x + ux*node.r, y1 = node.y + uy*node.r;
    const x2 = child.x - ux*(child.r+2), y2 = child.y - uy*(child.r+2);
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const curvature = 30;
    const px = -uy*curvature, py = ux*curvature;
    line.setAttribute('d', `M${x1},${y1} Q${mx+px},${my+py} ${x2},${y2}`);
    line.setAttribute('stroke', child.color);
    line.setAttribute('stroke-width', Math.max(1.5, child.r * 0.12));
    line.setAttribute('stroke-opacity', '0.35');
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke-linecap', 'round');
    g.appendChild(line);
    renderEdges(child);
  });
}

const tooltip = document.getElementById('tooltip');
const allNodes = [];

function renderNodes(node) {
  allNodes.push(node);
  // Glow
  const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('cx', node.x); glow.setAttribute('cy', node.y);
  glow.setAttribute('r', node.r + 8);
  glow.setAttribute('fill', hexToRgba(node.color, 0.08));
  g.appendChild(glow);

  // Circle
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', node.x); circle.setAttribute('cy', node.y);
  circle.setAttribute('r', node.r);
  circle.setAttribute('fill', hexToRgba(node.color, 0.18));
  circle.setAttribute('stroke', node.color);
  circle.setAttribute('stroke-width', node.r > 30 ? 2.5 : 1.5);
  circle.style.cursor = 'pointer';
  circle.style.transition = 'all .2s';

  circle.addEventListener('mouseenter', (e) => {
    circle.setAttribute('fill', hexToRgba(node.color, 0.4));
    tooltip.style.display = 'block';
    tooltip.innerHTML = `<strong>${node.label.replace('\n',' ')}</strong><span>${node.desc || ''}</span>`;
  });
  circle.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });
  circle.addEventListener('mouseleave', () => {
    circle.setAttribute('fill', hexToRgba(node.color, 0.18));
    tooltip.style.display = 'none';
  });
  g.appendChild(circle);

  // Label
  const lines = node.label.split('\n');
  const fs = node.r > 35 ? 13 : node.r > 22 ? 11 : node.r > 15 ? 10 : 9;
  const lineH = fs + 2;
  const totalH = lines.length * lineH;

  lines.forEach((line, i) => {
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', node.x);
    text.setAttribute('y', node.y - totalH/2 + i*lineH + fs*0.8);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', fs);
    text.setAttribute('font-weight', node.r > 30 ? '700' : '600');
    text.setAttribute('font-family', "-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif");
    text.setAttribute('pointer-events', 'none');
    text.setAttribute('class', 'node-label');
    text.textContent = line;
    g.appendChild(text);
  });

  if (node.children) node.children.forEach(renderNodes);
}

renderEdges(TREE);
renderNodes(TREE);

// ── Pan & Zoom ──────────────────────────────────────────────────
let isDragging = false, lastX = 0, lastY = 0;

svg.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX += e.clientX - lastX; panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { isDragging = false; });

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.2, Math.min(3, zoom * delta));
  applyTransform();
}, { passive: false });

function applyTransform() {
  g.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  // Fix transform origin around center
  g.style.transformOrigin = `${cx}px ${cy}px`;
}

function resetView() { zoom = 1; panX = 0; panY = 0; applyTransform(); }
function zoomIn()    { zoom = Math.min(3, zoom * 1.2); applyTransform(); }
function zoomOut()   { zoom = Math.max(0.2, zoom / 1.2); applyTransform(); }

function toggleLabels() {
  showLabels = !showLabels;
  document.querySelectorAll('.node-label').forEach(el => {
    el.style.display = showLabels ? '' : 'none';
  });
}

// Touch support
let lastTouchDist = null;
svg.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
});
svg.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    panX += e.touches[0].clientX - lastX; panY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) { zoom = Math.max(0.2, Math.min(3, zoom * dist / lastTouchDist)); applyTransform(); }
    lastTouchDist = dist;
  }
}, { passive: false });
svg.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });
</script>
